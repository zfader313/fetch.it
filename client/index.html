<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fetch.it</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { font-size: 24px; font-weight: 500; color: #ffffff; margin-bottom: 32px; letter-spacing: -0.5px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 768px) { .row { grid-template-columns: 1fr; gap: 32px; } }
        .col { display: flex; flex-direction: column; }
        h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #7c7c8a; margin-bottom: 16px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
        .search-box input {
            flex: 1; padding: 12px 16px; background: #202024; border: 1px solid #29292e;
            border-radius: 6px; font-size: 14px; color: #ffffff; outline: none; transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: #00b37e; }
        .btn {
            padding: 12px 20px; background: #00b37e; color: #ffffff; border: none;
            border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s;
        }
        .btn:hover { background: #00875f; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; background: #29292e; color: #7c7c8a; }
        .list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
        .list li {
            padding: 12px 16px; background: #202024; border: 1px solid #29292e;
            border-radius: 6px; cursor: pointer; font-size: 13px; color: #c4c4cc; transition: all 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .list li:hover { border-color: #00b37e; color: #ffffff; }
        .list li.selected { border-color: #00b37e; background: #126e5120; color: #ffffff; }
        #downloadBtn { margin-top: 12px; width: 100%; background: #29292e; border: 1px solid #323238; }
        #downloadBtn:not(:disabled):hover { background: #00b37e; border-color: #00b37e; }
        .progress-box { margin-top: 20px; background: #202024; border: 1px solid #29292e; padding: 16px; border-radius: 6px; display: none; }
        .progress-bar { width: 100%; height: 4px; background: #29292e; border-radius: 2px; overflow: hidden; margin: 12px 0; }
        .progress-fill { height: 100%; background: #00b37e; width: 0%; transition: width 0.2s; }
        .progress-text { display: flex; justify-content: space-between; font-size: 12px; color: #7c7c8a; }
        .msg { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; border: 1px solid; }
        .msg-error { background: #2c1a1a; color: #f75a68; border-color: #6a2424; }
        .msg-success { background: #182219; color: #00b37e; border-color: #123824; }
        .content-view { display: none; background: #202024; border: 1px solid #29292e; padding: 20px; border-radius: 6px; margin-top: 16px; }
        .content-view h3 { font-size: 16px; color: #ffffff; margin-bottom: 4px; font-weight: 500; }
        .content-view pre { white-space: pre-wrap; font-family: monospace; font-size: 13px; color: #c4c4cc; background: #121214; padding: 16px; border-radius: 4px; border: 1px solid #29292e; margin-top: 16px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>fetch.it</h1>
    <div class="row">
        <div class="col">
            <h2>Поиск контента</h2>
            <div class="msg msg-error" id="errorMsg"></div>
            <div class="msg msg-success" id="successMsg"></div>
            <div class="search-box">
                <input type="text" id="keywordInput" placeholder="Ключевое слово..." />
                <button class="btn" onclick="searchContent()">Найти</button>
            </div>
            <div id="urlListBox" style="display:none; margin-top: 8px;">
                <ul class="list" id="urlList"></ul>
                <button class="btn" id="downloadBtn" onclick="downloadContent()" disabled>Скачать выбранный контент</button>
            </div>
            <div class="progress-box" id="progressBox">
                <div class="progress-text">
                    <span>Загрузка данных</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text">
                    <span>Размер: <span id="fileSize">0 KB</span></span>
                    <span>Получено: <span id="loadedSize">0 KB</span></span>
                </div>
            </div>
        </div>
        <div class="col">
            <h2>История загрузок</h2>
            <ul class="list" id="savedList"></ul>
            <div class="content-view" id="contentView">
                <h3 id="contentTitle"></h3>
                <p style="font-size:12px; color:#7c7c8a;" id="contentMeta"></p>
                <pre id="contentBody"></pre>
            </div>
        </div>
    </div>
</div>
<script>
const SERVER_URL = '';
let selectedUrl = null;

document.addEventListener('DOMContentLoaded', function() {
    updateSavedList();
});

document.getElementById('keywordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') searchContent();
});

async function searchContent() {
    const keyword = document.getElementById('keywordInput').value.trim();
    hideMessages();
    if (!keyword) { showError('Введите ключевое слово'); return; }
    try {
        const res = await fetch(SERVER_URL + '/api/search?keyword=' + encodeURIComponent(keyword));
        if (!res.ok) throw new Error('Ошибка сервера');
        const data = await res.json();
        if (data.urls.length === 0) {
            showError('Ничего не найдено');
            document.getElementById('urlListBox').style.display = 'none';
            return;
        }
        showUrlList(data.urls);
    } catch (e) {
        showError('Ошибка: ' + e.message);
    }
}

function showUrlList(urls) {
    const box = document.getElementById('urlListBox');
    const list = document.getElementById('urlList');
    box.style.display = 'block';
    list.innerHTML = '';
    selectedUrl = null;
    document.getElementById('downloadBtn').disabled = true;
    urls.forEach(function(url) {
        const li = document.createElement('li');
        li.textContent = url;
        li.title = url;
        li.onclick = function() {
            document.querySelectorAll('#urlList li').forEach(function(el) { el.classList.remove('selected'); });
            li.classList.add('selected');
            selectedUrl = url;
            document.getElementById('downloadBtn').disabled = false;
        };
        list.appendChild(li);
    });
}

async function downloadContent() {
    if (!selectedUrl) { showError('Выберите URL'); return; }
    hideMessages();
    const progressBox = document.getElementById('progressBox');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const fileSize = document.getElementById('fileSize');
    const loadedSize = document.getElementById('loadedSize');
    progressBox.style.display = 'block';
    document.getElementById('downloadBtn').disabled = true;
    try {
        const res = await fetch(SERVER_URL + '/api/download?url=' + encodeURIComponent(selectedUrl));
        if (!res.ok) throw new Error('Ошибка загрузки');
        const total = parseInt(res.headers.get('Content-Length'));
        if (!total) throw new Error('Размер неизвестен');
        const reader = res.body.getReader();
        let received = 0;
        const chunks = [];
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            const pct = Math.round((received / total) * 100);
            progressFill.style.width = pct + '%';
            progressPercent.textContent = pct + '%';
            fileSize.textContent = formatBytes(total);
            loadedSize.textContent = formatBytes(received);
        }
        const all = new Uint8Array(received);
        let pos = 0;
        chunks.forEach(function(chunk) { all.set(chunk, pos); pos += chunk.length; });
        const content = new TextDecoder('utf-8').decode(all);
        saveToStorage(selectedUrl, content, total);
        showSuccess('Успешно сохранено');
        updateSavedList();
    } catch (e) {
        showError('Ошибка: ' + e.message);
    }
    document.getElementById('downloadBtn').disabled = false;
    setTimeout(function() { progressBox.style.display = 'none'; progressFill.style.width = '0%'; }, 2000);
}

function saveToStorage(url, content, size) {
    const data = JSON.parse(localStorage.getItem('fetcher_data') || '[]');
    data.unshift({
        id: Date.now(),
        url: url,
        keyword: document.getElementById('keywordInput').value.trim(),
        content: content.substring(0, 50000),
        size: size,
        time: new Date().toLocaleString()
    });
    if (data.length > 10) data.length = 10;
    localStorage.setItem('fetcher_data', JSON.stringify(data));
}

function updateSavedList() {
    const data = JSON.parse(localStorage.getItem('fetcher_data') || '[]');
    const list = document.getElementById('savedList');
    list.innerHTML = '';
    if (data.length === 0) {
        list.innerHTML = '<li style="cursor:default; border-style:dashed;">История пуста</li>';
        return;
    }
    data.forEach(function(item) {
        const li = document.createElement('li');
        const name = item.url.split('/').pop() || item.url;
        li.innerHTML = `<strong>${name}</strong><br><span style="font-size:11px; color:#7c7c8a;">${item.keyword} · ${formatBytes(item.size)}</span>`;
        li.onclick = function() { showContent(item.id); };
        list.appendChild(li);
    });
}

function showContent(id) {
    const data = JSON.parse(localStorage.getItem('fetcher_data') || '[]');
    const item = data.find(function(x) { return x.id === id; });
    if (!item) return;
    document.getElementById('contentView').style.display = 'block';
    document.getElementById('contentTitle').textContent = item.url.split('/').pop() || item.url;
    document.getElementById('contentMeta').textContent = `${item.time} · Источник: ${item.url}`;
    document.getElementById('contentBody').textContent = item.content;
}

function formatBytes(bytes) {
    if (!bytes) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 4000);
}
function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 3000);
}
function hideMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
}
</script>
</body>
</html>
